<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RGSC BHU Professor Rating</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.main-title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 5px;
}

.sub-title {
  text-align: center;
  font-size: 16px;
  color: #555;
  margin-bottom: 10px;
}

.section-title {
  text-align: center;
  font-size: 18px;
  margin-bottom: 15px;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  background: #007bff;
  color: white;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.message {
  text-align: center;
  font-weight: bold;
  margin-top: 10px;
}

.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">

  <div class="main-title">RGSC BHU, MIRZAPUR</div>
  <div class="sub-title">Department of Computer Science (MCA)</div>
  <div class="section-title">Professor Rating System</div>

  <form id="form">
    <label>Your Name *</label>
    <input type="text" id="name" required>

    <label>Dr Achintya Singhal</label>
    <select id="achintya" required>
    <option value="">Select</option>
      <option value="-5">-5</option>
      <option value="-4">-4</option>
      <option value="-3">-3</option>
      <option value="-2">-2</option>
      <option value="-1">-1</option>
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
</select>
    <label>Dr Manoj Kumar Mishra</label>
    <select id="manoj" required>
  <option value="">Select</option>
  <option value="-5">-5</option>
  <option value="-4">-4</option>
  <option value="-3">-3</option>
  <option value="-2">-2</option>
  <option value="-1">-1</option>
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
</select>

<label>Dr Vibhor Kant</label>
    <select id="vibhor" required>
  <option value="">Select</option>
  <option value="-5">-5</option>
  <option value="-4">-4</option>
  <option value="-3">-3</option>
  <option value="-2">-2</option>
  <option value="-1">-1</option>
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
</select>

    <button type="submit">Submit</button>
  </form>

  <div class="message" id="msg"></div>
</div>

<script>
const form = document.getElementById("form");
const msg = document.getElementById("msg");

// Prevent duplicate submission
if (localStorage.getItem("submitted") === "true") {
  form.style.display = "none";
  msg.innerText = "You have already voted.";
}

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();

  if (!name) {
    msg.innerText = "Please enter your name.";
    return;
  }

  const data = new URLSearchParams();
  data.append("name", name);
  data.append("achintya", document.getElementById("achintya").value);
  data.append("manoj", document.getElementById("manoj").value);
  data.append("vibhor", document.getElementById("vibhor").value);

  const scriptURL = "https://script.google.com/macros/s/AKfycbwurMwdu7MjyswgYIY7ahy7cuVEbhVBKD7bV8vRE4F4kXYcnn2zXgx4RBbUjoRda0F5/exec"
  msg.innerText = "Submitting...";

  fetch(scriptURL, {
    method: "POST",
    body: data,
    
  })
  .then(() => {
    localStorage.setItem("submitted", "true");
    form.style.display = "none";
    msg.innerText = "Thank you, " + name + "!";
  })
  .catch(() => {
    msg.innerText = "Error submitting form.";
  });
});
</script>

<div class="footer">
  Developed by Dhirendra Pratap Singh
</div>

</body>
</html>
